name: Launch Campaigns

on:
  workflow_run:
    workflows: ["Daily Scrape + Dashboard"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no Meta API calls)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  launch:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: decarba-remixer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: decarba-remixer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          META_INSTAGRAM_ACCOUNT_ID=${{ secrets.META_INSTAGRAM_ACCOUNT_ID }}
          META_PIXEL_ID=${{ secrets.META_PIXEL_ID }}
          META_PAGE_ID=${{ secrets.META_PAGE_ID }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          CONTENT_API_URL=${{ secrets.CONTENT_API_URL }}
          DASHBOARD_SECRET=${{ secrets.DASHBOARD_SECRET }}
          APPS_SCRIPT_URL=${{ secrets.APPS_SCRIPT_URL }}
          ENVEOF

      - name: Build
        run: npm run build

      - name: Launch from Postgres
        id: postgres_launch
        run: npm run launch:postgres${{ github.event.inputs.dry_run == 'true' && ' -- --dry-run' || '' }}
        timeout-minutes: 5
        continue-on-error: true

      - name: Launch from Sheets (fallback)
        if: steps.postgres_launch.outcome == 'failure'
        run: npm run launch${{ github.event.inputs.dry_run == 'true' && ' -- --dry-run' || '' }}
        timeout-minutes: 5
