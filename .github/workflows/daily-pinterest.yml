name: Daily Pinterest Remake

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 CET (06:00 UTC) — primary
    - cron: '0 9 * * *'   # 11:00 CET (09:00 UTC) — backup 1
    - cron: '0 12 * * *'  # 14:00 CET (12:00 UTC) — backup 2
  workflow_dispatch: # manual trigger

jobs:
  pinterest-remake:
    runs-on: ubuntu-latest
    env:
      FAL_KEY: ${{ secrets.FAL_KEY }}
      PINTEREST_APPS_SCRIPT_URL: ${{ secrets.PINTEREST_APPS_SCRIPT_URL }}
      CONTENT_API_URL: ${{ secrets.CONTENT_API_URL }}
      DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Skip if already ran today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if gh run list --workflow=daily-pinterest.yml --json createdAt,conclusion,event --jq "[.[] | select(.createdAt >= \"${TODAY}T00:00:00Z\" and .conclusion == \"success\")] | length" | grep -qv '^0$'; then
            echo "already_ran=true" >> "$GITHUB_OUTPUT"
            echo "Pinterest remake already succeeded today ($TODAY), skipping."
          else
            echo "already_ran=false" >> "$GITHUB_OUTPUT"
            echo "No successful Pinterest remake yet for $TODAY, proceeding."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Python
        if: steps.check.outputs.already_ran == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        if: steps.check.outputs.already_ran == 'false'
        run: |
          pip install requests python-dotenv playwright
          playwright install chromium --with-deps

      - name: Fetch processed pin IDs from Postgres
        if: steps.check.outputs.already_ran == 'false'
        run: |
          if [ -n "$CONTENT_API_URL" ] && [ -n "$DASHBOARD_SECRET" ]; then
            echo "Fetching processed pinterest pins from content API..."
            curl -sf "${CONTENT_API_URL}/api/content?source=pinterest" \
              -H "Authorization: Bearer ${DASHBOARD_SECRET}" \
              | python3 -c "import sys,json; items=json.load(sys.stdin); print('\n'.join(i['content_id'] for i in items))" \
              > /tmp/processed_pin_ids.txt 2>/dev/null || echo "Warning: Could not fetch processed pins from Postgres"
            echo "Found $(wc -l < /tmp/processed_pin_ids.txt) already-processed pins in Postgres"
          else
            echo "CONTENT_API_URL not set — skipping Postgres dedup pre-check"
            touch /tmp/processed_pin_ids.txt
          fi

      - name: Run Pinterest remake pipeline
        if: steps.check.outputs.already_ran == 'false'
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          PINTEREST_APPS_SCRIPT_URL: ${{ secrets.PINTEREST_APPS_SCRIPT_URL }}
          PROCESSED_PINS_FILE: /tmp/processed_pin_ids.txt
        run: python pipeline/cloud_pinterest.py --max 2

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \":red_circle: *${{ github.workflow }}* failed on ${{ github.ref_name }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
