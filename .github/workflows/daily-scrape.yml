name: Daily Scrape + Dashboard

on:
  schedule:
    - cron: '0 1 * * *'   # 03:00 CET (01:00 UTC) — primary
    - cron: '0 4 * * *'   # 06:00 CET (04:00 UTC) — backup 1
    - cron: '0 7 * * *'   # 09:00 CET (07:00 UTC) — backup 2
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decarba-remixer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Skip if already scraped today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if git log --oneline --since="$TODAY" --grep="dashboard: $TODAY" | grep -q .; then
            echo "already_ran=true" >> "$GITHUB_OUTPUT"
            echo "Dashboard already scraped today ($TODAY), skipping."
          else
            echo "already_ran=false" >> "$GITHUB_OUTPUT"
            echo "No scrape yet for $TODAY, proceeding."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.already_ran == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: decarba-remixer/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.already_ran == 'false'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.already_ran == 'false'
        run: npx playwright install chromium --with-deps

      - name: Create .env
        if: steps.check.outputs.already_ran == 'false'
        run: |
          cat > .env << 'ENVEOF'
          OXYLABS_USERNAME=${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD=${{ secrets.OXYLABS_PASSWORD }}
          PPSPY_COOKIES_JSON=${{ secrets.PPSPY_COOKIES_JSON }}
          FAL_KEY=${{ secrets.FAL_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          ZAPIER_WEBHOOK_URL=${{ secrets.ZAPIER_WEBHOOK_URL }}
          APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
          ENSEMBLEDATA_TOKEN=${{ secrets.ENSEMBLEDATA_TOKEN }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          CONTENT_API_URL=${{ secrets.CONTENT_API_URL }}
          DASHBOARD_SECRET=${{ secrets.DASHBOARD_SECRET }}
          DASHBOARD_AUTO_PUSH=false
          ENVEOF

      - name: Build
        if: steps.check.outputs.already_ran == 'false'
        run: npm run build

      - name: Initialize job summary
        if: steps.check.outputs.already_ran == 'false'
        run: |
          echo "## Scrape Results $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Found | Written | Skipped | Errors |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY

      - name: Scrape PPSpy
        if: steps.check.outputs.already_ran == 'false'
        run: |
          OUTPUT=$(npm run scrape 2>&1) || true
          echo "$OUTPUT"
          RESULT=$(echo "$OUTPUT" | grep "^\[result\]" | tail -1)
          if [ -n "$RESULT" ]; then
            FOUND=$(echo "$RESULT" | grep -oP 'found=\K\d+' || echo "0")
            WRITTEN=$(echo "$RESULT" | grep -oP 'written=\K\d+' || echo "0")
            SKIPPED=$(echo "$RESULT" | grep -oP 'skipped=\K\d+' || echo "0")
            ERRORS=$(echo "$RESULT" | grep -oP 'errors=\K\d+' || echo "0")
            echo "| PPSpy | $FOUND | $WRITTEN | $SKIPPED | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
        timeout-minutes: 10

      - name: Scrape Pinterest board
        if: steps.check.outputs.already_ran == 'false'
        run: |
          OUTPUT=$(npm run scrape:pinterest 2>&1) || true
          echo "$OUTPUT"
          RESULT=$(echo "$OUTPUT" | grep "^\[result\]" | tail -1)
          if [ -n "$RESULT" ]; then
            FOUND=$(echo "$RESULT" | grep -oP 'found=\K\d+' || echo "0")
            WRITTEN=$(echo "$RESULT" | grep -oP 'written=\K\d+' || echo "0")
            SKIPPED=$(echo "$RESULT" | grep -oP 'skipped=\K\d+' || echo "0")
            ERRORS=$(echo "$RESULT" | grep -oP 'errors=\K\d+' || echo "0")
            echo "| Pinterest | $FOUND | $WRITTEN | $SKIPPED | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
        timeout-minutes: 5

      - name: Scrape TikTok carousels
        if: steps.check.outputs.already_ran == 'false'
        run: |
          OUTPUT=$(npm run scrape:tiktok 2>&1) || true
          echo "$OUTPUT"
          RESULT=$(echo "$OUTPUT" | grep "^\[result\]" | tail -1)
          if [ -n "$RESULT" ]; then
            FOUND=$(echo "$RESULT" | grep -oP 'found=\K\d+' || echo "0")
            WRITTEN=$(echo "$RESULT" | grep -oP 'written=\K\d+' || echo "0")
            SKIPPED=$(echo "$RESULT" | grep -oP 'skipped=\K\d+' || echo "0")
            ERRORS=$(echo "$RESULT" | grep -oP 'errors=\K\d+' || echo "0")
            echo "| TikTok | $FOUND | $WRITTEN | $SKIPPED | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
        timeout-minutes: 12

      - name: Scrape Meta Ad Library
        if: steps.check.outputs.already_ran == 'false'
        run: |
          OUTPUT=$(npm run scrape:meta 2>&1) || true
          echo "$OUTPUT"
          RESULT=$(echo "$OUTPUT" | grep "^\[result\]" | tail -1)
          if [ -n "$RESULT" ]; then
            FOUND=$(echo "$RESULT" | grep -oP 'found=\K\d+' || echo "0")
            WRITTEN=$(echo "$RESULT" | grep -oP 'written=\K\d+' || echo "0")
            SKIPPED=$(echo "$RESULT" | grep -oP 'skipped=\K\d+' || echo "0")
            ERRORS=$(echo "$RESULT" | grep -oP 'errors=\K\d+' || echo "0")
            echo "| Meta | $FOUND | $WRITTEN | $SKIPPED | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
        timeout-minutes: 8

      - name: Generate dashboard
        if: steps.check.outputs.already_ran == 'false'
        run: npm run dashboard

      - name: Commit and push
        if: steps.check.outputs.already_ran == 'false'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add decarba-remixer/docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "dashboard: $(date +%Y-%m-%d)"
            git pull --rebase origin master || true
            git push
          fi

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \":red_circle: *${{ github.workflow }}* failed on ${{ github.ref_name }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi

  deploy-pages:
    needs: scrape-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Pull latest (after scrape push)
        run: git pull origin master

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: decarba-remixer/docs
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
