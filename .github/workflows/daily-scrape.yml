name: Daily Scrape + Dashboard

on:
  schedule:
    - cron: '0 23 * * *'  # 06:00 WIB / 00:00 CET (23:00 UTC)
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decarba-remixer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: decarba-remixer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          OXYLABS_USERNAME=${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD=${{ secrets.OXYLABS_PASSWORD }}
          PPSPY_COOKIES_JSON=${{ secrets.PPSPY_COOKIES_JSON }}
          FAL_KEY=${{ secrets.FAL_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          ZAPIER_WEBHOOK_URL=${{ secrets.ZAPIER_WEBHOOK_URL }}
          DASHBOARD_AUTO_PUSH=false
          ENVEOF

      - name: Build
        run: npm run build

      - name: Scrape PPSpy
        run: npm run scrape
        timeout-minutes: 10

      - name: Generate dashboard
        run: npm run dashboard

      - name: Commit and push
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add decarba-remixer/docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "dashboard: $(date +%Y-%m-%d)"
            git push
          fi

  deploy-pages:
    needs: scrape-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: decarba-remixer/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
