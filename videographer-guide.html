<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEWGARMENTS — Videographer Shoot Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --surface2: #1a1a1a;
    --border: #222;
    --text: #f0f0f0;
    --text2: #aaa;
    --text3: #666;
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --blue: #818cf8;
    --blue-bg: rgba(129,140,248,0.1);
    --orange: #fb923c;
    --orange-bg: rgba(251,146,60,0.1);
    --pink: #f472b6;
    --pink-bg: rgba(244,114,182,0.1);
    --cyan: #22d3ee;
    --yellow: #fbbf24;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 100;
  }

  .topbar-logo {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .topbar-logo span { color: var(--text3); font-weight: 400; }

  .topbar-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text3);
  }

  .progress-bar {
    width: 120px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .topbar-nav {
    display: flex;
    gap: 8px;
  }

  .topbar-nav button {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .topbar-nav button:hover { background: var(--surface2); color: var(--text); }
  .topbar-nav button:disabled { opacity: 0.3; cursor: default; }

  /* ── MAIN CONTENT ── */
  .main {
    margin-top: 56px;
    min-height: calc(100vh - 56px);
  }

  /* ── OVERVIEW SCREEN ── */
  .overview {
    max-width: 800px;
    margin: 0 auto;
    padding: 48px 28px 80px;
  }

  .overview-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .overview-header h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .overview-header p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 500px;
    margin: 0 auto;
  }

  .idea-card-overview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .idea-card-overview:hover {
    background: var(--surface2);
    border-color: #333;
    transform: translateY(-1px);
  }

  .idea-num {
    font-size: 32px;
    font-weight: 800;
    color: var(--border);
    min-width: 50px;
    text-align: center;
  }

  .idea-card-info { flex: 1; }

  .idea-card-info h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .idea-card-info p {
    font-size: 13px;
    color: var(--text3);
    line-height: 1.5;
  }

  .idea-card-meta {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .meta-pill {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .idea-card-arrow {
    color: var(--text3);
    font-size: 20px;
  }

  .completed-badge {
    font-size: 10px;
    font-weight: 700;
    color: var(--green);
    background: var(--green-bg);
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── DETAIL SCREEN ── */
  .detail-screen {
    display: none;
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 28px 100px;
  }

  .detail-screen.active { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    margin-bottom: 24px;
    padding: 6px 0;
    transition: color 0.2s;
  }

  .back-btn:hover { color: var(--text); }

  .detail-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .detail-title {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 20px;
  }

  /* Goal Tags */
  .goal-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .goal-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .goal-tag.conversion { color: var(--green); background: var(--green-bg); }
  .goal-tag.awareness { color: var(--blue); background: var(--blue-bg); }
  .goal-tag.trust { color: var(--orange); background: var(--orange-bg); }
  .goal-tag.fomo { color: var(--pink); background: var(--pink-bg); }
  .goal-tag.engagement { color: var(--cyan); background: rgba(34,211,238,0.1); }
  .goal-tag.brand { color: #a78bfa; background: rgba(167,139,250,0.1); }

  /* Info Grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 32px;
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .info-box-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .info-box-value {
    font-size: 16px;
    font-weight: 700;
  }

  /* The Hook Box */
  .hook-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--green);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 32px;
  }

  .hook-box-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }

  .hook-box-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
  }

  .hook-box-note {
    font-size: 12px;
    color: var(--text3);
    margin-top: 10px;
    line-height: 1.6;
  }

  /* Section */
  .section {
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-text {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
  }

  .section-text strong { color: var(--text); }

  /* Step Cards */
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .step-header:hover { background: var(--surface2); }

  .step-number {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    flex-shrink: 0;
  }

  .step-number.active-step {
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green);
  }

  .step-summary {
    flex: 1;
  }

  .step-summary h4 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .step-summary p {
    font-size: 12px;
    color: var(--text3);
  }

  .step-duration {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    white-space: nowrap;
  }

  .step-toggle {
    color: var(--text3);
    font-size: 16px;
    transition: transform 0.2s;
  }

  .step-body {
    display: none;
    padding: 0 22px 20px 68px;
    border-top: 1px solid var(--border);
  }

  .step-body.open { display: block; padding-top: 18px; }

  .step-detail-row {
    margin-bottom: 14px;
  }

  .step-detail-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .step-detail-value {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }

  .tip-box {
    background: rgba(251,191,36,0.06);
    border: 1px solid rgba(251,191,36,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 10px;
  }

  .tip-box-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .tip-box-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }

  /* Equipment box */
  .equip-list {
    list-style: none;
    padding: 0;
  }

  .equip-list li {
    font-size: 13px;
    color: var(--text2);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .equip-list li:last-child { border-bottom: none; }

  .equip-icon {
    color: var(--green);
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Proof box */
  .proof-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 8px;
  }

  .proof-brand {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .proof-detail {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
  }

  /* Start button */
  .start-section {
    text-align: center;
    margin: 40px 0;
  }

  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 48px;
    border-radius: 12px;
    border: none;
    background: var(--green);
    color: #000;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .start-btn:hover { background: #6ee7a0; transform: translateY(-1px); }

  .start-btn-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 10px;
  }

  /* Shoot Mode */
  .shoot-mode {
    display: none;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 28px 100px;
  }

  .shoot-mode.active { display: block; }

  .shoot-step-indicator {
    text-align: center;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text3);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .shoot-step-title {
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 32px;
  }

  .shoot-instruction-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    margin-bottom: 20px;
  }

  .shoot-instruction-box h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }

  .shoot-instruction-box p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
  }

  .shoot-instruction-box .highlight {
    background: var(--green-bg);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }

  .shoot-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    gap: 12px;
  }

  .shoot-nav-btn {
    padding: 12px 32px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .shoot-nav-btn:hover { background: var(--surface2); color: var(--text); }

  .shoot-nav-btn.primary {
    background: var(--green);
    color: #000;
    border: none;
  }

  .shoot-nav-btn.primary:hover { background: #6ee7a0; }

  .shoot-dots {
    display: flex;
    gap: 6px;
  }

  .shoot-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .shoot-dot.active { background: var(--green); }
  .shoot-dot.done { background: var(--text3); }

  /* Text overlay preview */
  .text-preview {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    text-align: center;
    margin: 16px 0;
  }

  .text-preview p {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
  }

  .text-preview small {
    font-size: 11px;
    color: var(--text3);
    display: block;
    margin-top: 8px;
  }

  /* Checklist */
  .checklist {
    list-style: none;
    padding: 0;
  }

  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .checklist li:last-child { border-bottom: none; }

  .check-icon {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
  }

  .check-icon.checked {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .info-grid { grid-template-columns: repeat(2, 1fr); }
    .detail-title { font-size: 22px; }
    .hook-box-text { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">NEWGARMENTS <span>/ Shoot Guide</span></div>
  <div class="topbar-progress">
    <span id="progress-text">0 of 30 filmed</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="topbar-nav">
    <button onclick="showOverview()">All Ideas</button>
  </div>
</div>

<div class="main">
  <!-- OVERVIEW -->
  <div class="overview" id="overview-screen">
    <div class="overview-header">
      <h1>Shoot Guide</h1>
      <p>Hey! These are all the content ideas for NEWGARMENTS, sorted by impact. Click any idea to see the full brief — everything you need to film it perfectly. No questions needed.</p>
    </div>
    <div id="idea-list"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail-screen" id="detail-screen"></div>

  <!-- SHOOT MODE -->
  <div class="shoot-mode" id="shoot-mode"></div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────
const IDEAS = [
  {
    id: 1, title: "The Scale Test", potential: 95, difficulty: 1,
    tags: ["conversion", "trust"],
    platforms: ["TikTok", "Reels"], duration: "10-15 sec",
    hook: "Your hoodie weighs this much... ours weighs this much.",
    hookNote: "This text appears on screen as you drop each hoodie on the scale. Say nothing — let the numbers speak. The hook IS the weight difference.",
    textOverlay: "Stop paying premium for paper-thin hoodies.",
    cta: "Link in bio. No restock.",
    why: "This is undeniable visual proof. The scale doesn't lie. It bypasses all skepticism because there's no way to fake a number on a scale. When Gen Z sees 340g vs 880g side by side, the decision makes itself. This is the single most effective format for converting skeptical first-time buyers.",
    psychology: "73% of Gen Z research brands before buying because they've been burned by AliExpress-quality products marketed as premium. The scale gives them the proof they need in 10 seconds. It also makes them question every other hoodie they own — which drives them to buy yours.",
    proof: [
      { brand: "Cole Buxton", detail: "Pioneered fabric weight content on TikTok. Their GSM comparison videos consistently hit 100K-500K+ views. They turned 'GSM' into a mainstream streetwear term." },
      { brand: "Fashion creators", detail: "The 'weigh my hoodie' format gets 200K-1M views regularly. One creator weighing a Zara hoodie vs a premium hoodie got 2.3M views." }
    ],
    equipment: ["Kitchen scale or postal scale", "1x NEWGARMENTS hoodie", "1x thin/cheap hoodie (Zara, H&M, any fast fashion)", "Phone with camera", "Clean surface (table or counter)"],
    steps: [
      {
        title: "Set up the scale",
        action: "Place a kitchen scale or postal scale on a clean, flat surface. Make sure it's zeroed. Use a plain background — white, wood, or dark surface. Nothing distracting.",
        camera: "Phone mounted overhead looking straight down at the scale. Prop phone on books or use a tripod. Make sure the scale numbers are clearly readable.",
        angle: "Top-down (bird's eye view). Keep the frame tight — just the scale and hands entering frame.",
        lighting: "Natural light from a window to the side. Avoid shadows falling on the scale display.",
        duration: "This setup shot won't be in the final video — it's just prep.",
        tip: "Turn off the scale between takes so it re-zeros. Clean any fingerprints off the scale surface."
      },
      {
        title: "Drop the cheap hoodie",
        action: "Pick up the thin/fast fashion hoodie from off-screen. Drop it onto the scale from about 15cm above. Let the camera hold on the number for 2 seconds.",
        camera: "Keep rolling from the overhead angle. Hand enters frame from the side, drops the hoodie, hand exits. Don't touch the hoodie after dropping.",
        angle: "Same top-down. The hoodie should land centered on the scale.",
        lighting: "Same natural sidelight.",
        duration: "This clip will be about 3-4 seconds in the edit.",
        tip: "The cheap hoodie should look visibly thin and light. If it's bunched up, it might look heavier than it is — let it land flat and limp. The low number on the scale is the point."
      },
      {
        title: "Clear and re-zero",
        action: "Remove the cheap hoodie from the scale. Wait for it to zero again. This part gets cut in the edit — but make sure the scale is at zero before the next shot.",
        camera: "You can stop recording here or just keep rolling and cut this part later.",
        angle: "Same.",
        lighting: "Same.",
        duration: "Not in final video.",
        tip: "If using a digital scale, wait for the '0.0' to fully settle."
      },
      {
        title: "Drop the NEWGARMENTS hoodie",
        action: "Pick up the NEWGARMENTS hoodie from off-screen. Drop it onto the scale from the same height (~15cm). It should land with a visible THUD — heavier items make a different sound. Hold the shot on the number for 3 full seconds.",
        camera: "Same overhead angle. The contrast between the two numbers is the entire video. Make sure the number is sharp and readable.",
        angle: "Top-down. Same framing as the cheap hoodie shot so the comparison is direct.",
        lighting: "Same.",
        duration: "This is the money shot — 4-5 seconds. Hold it. Let the number sink in.",
        tip: "IMPORTANT: Make sure the audio is on. The sound of the heavyweight hoodie hitting the scale is part of what sells it. That thud vs the soft 'flop' of the cheap one — people notice."
      },
      {
        title: "Optional: wear shot",
        action: "Quick cut to someone wearing the NEWGARMENTS hoodie. Walking away from camera, or a confident standing shot. This grounds the video — reminds them it's not just a number, it's something you wear.",
        camera: "Switch to handheld or tripod at eye level. Shoot in portrait (9:16) for TikTok/Reels.",
        angle: "Slightly below eye level looking up — makes the person look confident and the hoodie look substantial.",
        lighting: "Natural light, window light, or outdoor golden hour.",
        duration: "2-3 seconds max.",
        tip: "This shot is optional but recommended. Without it, the video is just a scale video. With it, it becomes an aspirational video WITH proof."
      },
      {
        title: "Edit instructions",
        action: "Cut together: cheap hoodie drop (3 sec) → NEWGARMENTS hoodie drop (4 sec) → optional wear shot (2 sec). Add text overlay. Total video: 10-15 seconds.",
        camera: "N/A — this is the edit phase.",
        angle: "N/A",
        lighting: "N/A",
        duration: "Final video: 10-15 seconds",
        tip: "Add the text 'Stop paying premium for paper-thin hoodies.' on screen during the NEWGARMENTS hoodie shot. Use a clean sans-serif font, white text, slight drop shadow. Post with caption: 'Link in bio. No restock.' Do NOT add music — the natural sound of the fabric hitting the scale is more powerful."
      }
    ]
  },
  {

// ── State ──
let completedIds = JSON.parse(localStorage.getItem('ng_completed') || '[]');
let currentIdea = null;
let shootStepIndex = 0;

function saveCompleted() {
  localStorage.setItem('ng_completed', JSON.stringify(completedIds));
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((completedIds.length / IDEAS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completedIds.length} of ${IDEAS.length} filmed`;
}

// ── Overview ──
function showOverview() {
  document.getElementById('overview-screen').style.display = 'block';
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('shoot-mode').style.display = 'none';
  document.getElementById('shoot-mode').classList.remove('active');
  window.scrollTo(0, 0);
  renderList();
}

function renderList() {
  const list = document.getElementById('idea-list');
  const sorted = [...IDEAS].sort((a, b) => b.potential - a.potential);
  list.innerHTML = sorted.map(idea => {
    const done = completedIds.includes(idea.id);
    return `
      <div class="idea-card-overview" onclick="openIdea(${idea.id})">
        <div class="idea-num">${String(idea.id).padStart(2,'0')}</div>
        <div class="idea-card-info">
          <h3>${idea.title}</h3>
          <p>"${idea.hook}"</p>
          <div class="idea-card-meta">
            ${idea.tags.map(t => `<span class="meta-pill">${t}</span>`).join('')}
            <span class="meta-pill">${idea.duration}</span>
            <span class="meta-pill">Difficulty ${idea.difficulty}/3</span>
            ${done ? '<span class="completed-badge">✓ Filmed</span>' : ''}
          </div>
        </div>
        <div class="idea-card-arrow">→</div>
      </div>
    `;
  }).join('');
}

// ── Detail ──

            <div class="step-detail-row"><div class="step-detail-label">Camera setup</div><div class="step-detail-value">${s.camera}</div></div>
            <div class="step-detail-row"><div class="step-detail-label">Angle</div><div class="step-detail-value">${s.angle}</div></div>
            <div class="step-detail-row"><div class="step-detail-label">Lighting</div><div class="step-detail-value">${s.lighting}</div></div>
            ${s.tip ? `<div class="tip-box"><div class="tip-box-label">💡 Pro Tip</div><div class="tip-box-text">${s.tip}</div></div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="start-section">
      <button class="start-btn" onclick="startShoot(${currentIdea.id})">▶ Start Shooting This Video</button>
      <div class="start-btn-sub">Step-by-step guided mode — one instruction at a time</div>
    </div>

    ${done ? '<div style="text-align:center;margin-top:16px;"><span class="completed-badge" style="font-size:12px;padding:6px 16px;">✓ Marked as Filmed</span></div>' : `<div style="text-align:center;margin-top:12px;"><button onclick="markComplete(${currentIdea.id})" style="background:none;border:1px solid var(--border);color:var(--text3);padding:8px 20px;border-radius:8px;font-size:12px;font-family:Inter,sans-serif;cursor:pointer;">Mark as filmed</button></div>`}
  `;
}

function toggleStep(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.step-toggle');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    toggle.textContent = '▸';
  } else {
    body.classList.add('open');
    toggle.textContent = '▾';
  }
}

// ── Shoot Mode ──
function startShoot(id) {
  currentIdea = IDEAS.find(i => i.id === id);
  if (!currentIdea) return;
  shootStepIndex = 0;

  document.getElementById('overview-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('detail-screen').classList.remove('active');
  const el = document.getElementById('shoot-mode');
  el.style.display = 'block';
  el.classList.add('active');
  window.scrollTo(0, 0);
  renderShootStep();
}

function renderShootStep() {
  const el = document.getElementById('shoot-mode');
  const step = currentIdea.steps[shootStepIndex];
  const total = currentIdea.steps.length;
  const isLast = shootStepIndex === total - 1;
  const isFirst = shootStepIndex === 0;

  el.innerHTML = `
    <button class="back-btn" onclick="openIdea(${currentIdea.id})">← Back to overview</button>

    <div class="shoot-step-indicator">Step ${shootStepIndex + 1} of ${total} — ${currentIdea.title}</div>
    <div class="shoot-step-title">${step.title}</div>

    <div class="shoot-dots" style="justify-content:center;margin-bottom:32px;">
      ${currentIdea.steps.map((_, i) => `<div class="shoot-dot ${i < shootStepIndex ? 'done' : ''} ${i === shootStepIndex ? 'active' : ''}"></div>`).join('')}
    </div>

    <div class="shoot-instruction-box">
      <h3>📋 What to do</h3>
      <p>${step.action}</p>
    </div>

    <div class="shoot-instruction-box">
      <h3>📷 Camera</h3>
      <p>${step.camera}</p>
    </div>

    <div class="shoot-instruction-box">
      <h3>📐 Angle</h3>
      <p>${step.angle}</p>
    </div>

    <div class="shoot-instruction-box">
      <h3>💡 Lighting</h3>
      <p>${step.lighting}</p>
    </div>

    <div class="shoot-instruction-box">
      <h3>⏱ Duration</h3>
      <p>${step.duration}</p>
    </div>

    ${step.tip ? `
    <div class="tip-box" style="margin-top:20px;">
      <div class="tip-box-label">💡 Pro Tip</div>
      <div class="tip-box-text">${step.tip}</div>
    </div>
    ` : ''}

    <div class="shoot-nav">
      <button class="shoot-nav-btn" onclick="prevShootStep()" ${isFirst ? 'disabled style="opacity:0.3"' : ''}>← Previous</button>
      ${isLast ? `
        <button class="shoot-nav-btn primary" onclick="finishShoot()">✓ Finish & Mark as Filmed</button>
      ` : `
        <button class="shoot-nav-btn primary" onclick="nextShootStep()">Next Step →</button>
      `}
    </div>
  `;
}

function nextShootStep() {
  if (shootStepIndex < currentIdea.steps.length - 1) {
    shootStepIndex++;
    window.scrollTo(0, 0);
    renderShootStep();
  }
}

function prevShootStep() {
  if (shootStepIndex > 0) {
    shootStepIndex--;
    window.scrollTo(0, 0);
    renderShootStep();
  }
}

function finishShoot() {
  markComplete(currentIdea.id);
  showOverview();
}

function markComplete(id) {
  if (!completedIds.includes(id)) {
    completedIds.push(id);
    saveCompleted();
  }
  openIdea(id);
}

// ── Init ──
updateProgress();
renderList();
</script>

</body>
</html>
